name: Release

# Fires when a tag like v0.1.0 is pushed. Cross-compiles the Tauri app on
# the three main desktop platforms and uploads the installers to a draft
# GitHub Release — which the maintainer can review and publish.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            label: macos-x64
          - platform: ubuntu-22.04
            args: ""
            label: linux-x64
          - platform: windows-latest
            args: ""
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "gui/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: "BA | Stamp Verify ${{ github.ref_name }}"
          releaseBody: |
            Independent desktop verifier for BA | Stamp blockchain timestamps.

            Unsigned binaries — macOS: right-click → Open the first time.
            Windows: SmartScreen → "More info" → "Run anyway".

            Source: https://github.com/stamp-verify/stamp-verify
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
