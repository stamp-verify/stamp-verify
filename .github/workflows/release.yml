name: Release

# Fires when a tag like v0.1.0 is pushed. Cross-compiles the Tauri app on
# the main desktop platforms. The Windows .msi is routed through SignPath
# Foundation for code signing when the SIGNPATH_API_TOKEN secret is set;
# otherwise it ships unsigned (SmartScreen click-through).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    env:
      # Exposing the secret as env lets step `if:` conditions test whether
      # SignPath is configured without leaking the token in logs.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"
            artifact_path: "gui/src-tauri/target/aarch64-apple-darwin/release/bundle"
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            tauri_args: "--target x86_64-apple-darwin"
            artifact_path: "gui/src-tauri/target/x86_64-apple-darwin/release/bundle"
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
            artifact_path: "gui/src-tauri/target/release/bundle"
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
            artifact_path: "gui/src-tauri/target/release/bundle"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "gui/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          args: ${{ matrix.tauri_args }}

      # ─── Windows only: optional SignPath Foundation signing ───
      - name: Upload unsigned .msi as GH artifact
        if: matrix.platform == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        id: upload_msi
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-unsigned
          path: ${{ matrix.artifact_path }}/msi/*.msi
          if-no-files-found: error

      - name: Sign Windows .msi via SignPath
        if: matrix.platform == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_msi.outputs.artifact-id }}
          artifact-configuration-slug: msi-installer
          wait-for-completion: true
          output-artifact-directory: signed-msi

      # ─── Publish release (all platforms) ───
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          # Prefer the SignPath-signed .msi when present.
          if [ -d signed-msi ] && ls signed-msi/*.msi >/dev/null 2>&1; then
            cp signed-msi/*.msi release-assets/
          else
            find "${{ matrix.artifact_path }}" -name "*.msi" -exec cp {} release-assets/ \; 2>/dev/null || true
          fi
          # Non-Windows artifacts and unsigned .exe fallbacks.
          find "${{ matrix.artifact_path }}" -type f \( \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.exe" \
          \) -exec cp {} release-assets/ \; 2>/dev/null || true
          ls -la release-assets/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "BA | Stamp Verify ${{ github.ref_name }}"
          draft: true
          prerelease: false
          files: release-assets/*
          body: |
            Independent desktop verifier for BA | Stamp blockchain timestamps.

            macOS: right-click → Open the first time (unsigned until Apple Developer enrollment).
            Windows: signed via SignPath Foundation if the workflow was configured; otherwise SmartScreen click-through.
            Linux: no signing required.

            Source: https://github.com/stamp-verify/stamp-verify
